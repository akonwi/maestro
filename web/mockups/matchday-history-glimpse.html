<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maestro — Matchday History</title><style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap');
:root{--bg:#fff;--fg:#111;--muted:#f4f4f4;--sub:#666;--border:#e5e5e5;--blue:#2563eb;--blue-m:#dbeafe;--green:#15803d;--surface:#fff;font-family:Geist,system-ui,sans-serif;color:var(--fg);background:var(--bg)}*{box-sizing:border-box}body{margin:0;background:var(--bg)}button{font:inherit;border-radius:0;color:inherit}.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}.appbar{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:var(--surface)}.brand{font-weight:700;font-size:13px;letter-spacing:.16em}.nav{display:flex;gap:18px;font-size:12px;font-weight:600}.nav span:first-child{color:var(--blue)}.page{width:min(100%,960px);margin:auto;padding:38px 16px 60px}.kicker{font:700 10px 'JetBrains Mono';letter-spacing:.12em;text-transform:uppercase;color:var(--blue)}h1{font-size:30px;letter-spacing:-.03em;margin:11px 0 7px}p{font-size:13px;color:var(--sub);margin:0;line-height:1.45}.roundnav{height:48px;border:1px solid var(--border);display:grid;grid-template-columns:48px 1fr 48px;margin:26px 0 30px;background:var(--surface)}.roundnav>button{border:0;background:#fff;font-weight:700;cursor:pointer}.roundnav>button:first-child{border-right:1px solid var(--border)}.roundnav>button:last-child{border-left:1px solid var(--border)}.roundnav>button:disabled{color:#bbb}.round-select{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;font-weight:700}.round-select small{font:600 9px 'JetBrains Mono';color:var(--sub);text-transform:uppercase;letter-spacing:.08em}.day{margin-top:28px}.day:first-child{margin-top:0}.day h2{font:700 10px 'JetBrains Mono';text-transform:uppercase;letter-spacing:.08em;color:var(--sub);margin:0 0 10px}.rows{display:grid;gap:7px}.fixture{min-height:80px;border:1px solid var(--border);background:var(--surface);display:grid;grid-template-columns:58px minmax(0,1fr) auto 15px;gap:8px;align-items:center;padding:10px 11px}.fixture:hover{border-color:var(--fg)}.when{font:700 11px 'JetBrains Mono'}.when small{display:block;font:500 10px Geist;color:var(--sub);margin-top:5px}.teams{display:grid;gap:8px;min-width:0}.team{display:flex;gap:7px;align-items:center;min-width:0;font-size:12px;font-weight:600}.crest{width:25px;height:25px;display:grid;place-items:center;flex:none;border:1px solid var(--border);background:var(--muted);font:700 7px 'JetBrains Mono'}.mia{background:#fe94a8;color:#111;border-color:#111}.orl{background:#5b2b82;color:#fff}.atl{background:#b21e35;color:#fff}.nyc{background:#6cace4;color:#111}.clb{background:#f9d616;color:#111}.cin{background:#f15a22;color:#111}.scores{display:grid;gap:8px;text-align:right;font:700 14px 'JetBrains Mono'}.row-end{display:grid;justify-items:end;gap:7px;min-width:36px}.points{border:1px solid var(--blue);background:var(--blue-m);color:var(--blue);padding:3px 5px;font:700 10px 'JetBrains Mono'}.points.zero{border-color:var(--border);background:var(--muted);color:var(--sub)}.pick{font:500 9px 'JetBrains Mono';color:var(--sub)}.caret{color:var(--sub)}.open{font:600 9px 'JetBrains Mono';color:var(--blue);text-transform:uppercase}.picker{display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:9;align-items:flex-end}.picker.show{display:flex}.sheet{background:#fff;width:100%;max-height:72vh;border-top:1px solid #111;padding-bottom:24px}.sheet-head{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px}.sheet-head h2{font-size:14px;margin:0}.close{border:0;background:#fff;font-weight:700}.rounds{display:grid;max-height:55vh;overflow:auto}.round{min-height:52px;border:0;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;text-align:left}.round strong{font-size:13px}.round small{display:block;color:var(--sub);margin-top:3px}.round.current{border-left:3px solid var(--blue);background:var(--blue-m)}.round .result{font:600 10px 'JetBrains Mono';color:var(--sub)}.round.current .result{color:var(--blue)}
@media(min-width:700px){.page{padding-top:54px}.fixture{grid-template-columns:88px minmax(0,1fr) 60px 90px 15px;padding:10px 16px}.teams{grid-template-columns:1fr 1fr;gap:24px}.team:nth-child(2){flex-direction:row-reverse;text-align:right}.scores{grid-template-columns:1fr 1fr;gap:24px}.sheet{width:360px;height:100%;max-height:none;border-top:0;border-left:1px solid #111;margin-left:auto}.picker{align-items:stretch}.rounds{max-height:calc(100vh - 72px)}}
</style></head><body><header class="appbar"><div class="brand">MAESTRO</div><div class="nav"><span>Fixtures</span><span>Groups</span></div></header><main class="page"><div class="kicker" id="kicker">MLS / Current matchday</div><h1 id="title">Matchday 28</h1><p id="intro">Make your picks before kickoff. Exact score earns three points.</p><div class="roundnav"><button id="prev" aria-label="Previous matchday">←</button><button class="round-select" id="choose"><span id="roundLabel">Matchday 28</span><small>Choose ▾</small></button><button id="next" aria-label="Next matchday" disabled>→</button></div><div id="content"></div></main><div class="picker" id="picker"><div class="sheet"><div class="sheet-head"><h2>Choose matchday</h2><button class="close" id="close">Close</button></div><div class="rounds"><button class="round current" data-round="28"><span><strong>Matchday 28</strong><small>July 19–20</small></span><span class="result">Current</span></button><button class="round" data-round="27"><span><strong>Matchday 27</strong><small>July 12–13</small></span><span class="result">10 finished</span></button><button class="round" data-round="26"><span><strong>Matchday 26</strong><small>July 5–6</small></span><span class="result">10 finished</span></button><button class="round" data-round="25"><span><strong>Matchday 25</strong><small>June 28–29</small></span><span class="result">11 finished</span></button><button class="round" data-round="24"><span><strong>Matchday 24</strong><small>June 14–15</small></span><span class="result">9 finished</span></button><button class="round" data-round="23"><span><strong>Matchday 23</strong><small>May 31–June 1</small></span><span class="result">10 finished</span></button></div></div></div><script>
const upcoming=`<section class="day"><h2>Saturday, July 19</h2><div class="rows"><div class="fixture"><div class="when">7:30 PM<small>Upcoming</small></div><div class="teams"><div class="team"><span class="crest mia">MIA</span>Inter Miami</div><div class="team"><span class="crest orl">ORL</span>Orlando City</div></div><div class="scores"><span>—</span><span>—</span></div><div class="row-end"><span class="open">Pick open</span></div><span class="caret">›</span></div><div class="fixture"><div class="when">8:30 PM<small>Upcoming</small></div><div class="teams"><div class="team"><span class="crest atl">ATL</span>Atlanta United</div><div class="team"><span class="crest nyc">NYC</span>New York City</div></div><div class="scores"><span>—</span><span>—</span></div><div class="row-end"><span class="open">Pick open</span></div><span class="caret">›</span></div></div></section><section class="day"><h2>Sunday, July 20</h2><div class="rows"><div class="fixture"><div class="when">6:00 PM<small>Upcoming</small></div><div class="teams"><div class="team"><span class="crest clb">CLB</span>Columbus Crew</div><div class="team"><span class="crest cin">CIN</span>FC Cincinnati</div></div><div class="scores"><span>—</span><span>—</span></div><div class="row-end"><span class="open">Pick open</span></div><span class="caret">›</span></div></div></section>`;
const finished=`<section class="day"><h2>Saturday, July 12</h2><div class="rows"><div class="fixture"><div class="when">FT<small>7:30 PM</small></div><div class="teams"><div class="team"><span class="crest mia">MIA</span>Inter Miami</div><div class="team"><span class="crest orl">ORL</span>Orlando City</div></div><div class="scores"><span>3</span><span>1</span></div><div class="row-end"><span class="points">+3</span><span class="pick">Pick 3–1</span></div><span class="caret">›</span></div><div class="fixture"><div class="when">FT<small>8:30 PM</small></div><div class="teams"><div class="team"><span class="crest atl">ATL</span>Atlanta United</div><div class="team"><span class="crest nyc">NYC</span>New York City</div></div><div class="scores"><span>1</span><span>2</span></div><div class="row-end"><span class="points zero">0</span><span class="pick">Pick 2–1</span></div><span class="caret">›</span></div></div></section><section class="day"><h2>Sunday, July 13</h2><div class="rows"><div class="fixture"><div class="when">FT<small>6:00 PM</small></div><div class="teams"><div class="team"><span class="crest clb">CLB</span>Columbus Crew</div><div class="team"><span class="crest cin">CIN</span>FC Cincinnati</div></div><div class="scores"><span>2</span><span>2</span></div><div class="row-end"><span class="points">+1</span><span class="pick">Pick 1–1</span></div><span class="caret">›</span></div></div></section>`;
let round=28;const q=s=>document.querySelector(s);function render(){const current=round===28;q('#kicker').textContent=current?'MLS / Current matchday':'MLS / Results';q('#title').textContent='Matchday '+round;q('#roundLabel').textContent='Matchday '+round;q('#intro').textContent=current?'Make your picks before kickoff. Exact score earns three points.':'Review results, prediction points, and match analysis.';q('#content').innerHTML=current?upcoming:finished;q('#next').disabled=current;document.querySelectorAll('.round').forEach(x=>x.classList.toggle('current',Number(x.dataset.round)===round))}q('#prev').onclick=()=>{round=Math.max(1,round-1);render()};q('#next').onclick=()=>{round=Math.min(28,round+1);render()};q('#choose').onclick=()=>q('#picker').classList.add('show');q('#close').onclick=()=>q('#picker').classList.remove('show');q('#picker').onclick=e=>{if(e.target===q('#picker'))q('#picker').classList.remove('show')};document.querySelectorAll('.round').forEach(x=>x.onclick=()=>{round=Number(x.dataset.round);q('#picker').classList.remove('show');render()});render();
</script></body></html>
